name: omnipos
description: OmniPOS — Multi-tenant Offline-First Cloud POS for Sri Lanka
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Offline-first local database (sqflite — no code generation needed)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Networking (connectivity check uses dart:io Socket — no extra package needed)
  http: ^1.2.0

  # Security & Storage
  flutter_secure_storage: ^9.2.2

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
